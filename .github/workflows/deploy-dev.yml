name: CI Back (develop)

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop
  workflow_dispatch: {}

jobs:
  checks:
    name: Lint / Build / Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: back-ci-develop-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -s run lint

      - name: Tests
        run: pnpm -s run --if-present test

      - name: Build
        run: pnpm -s run build
